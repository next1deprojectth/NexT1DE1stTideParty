<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Messages in a Bottle - NexT1DE 1st Anniversary</title>
    <!-- Google Fonts for Thai & English -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Mali:ital,wght@0,200;0,300;0,400;0,500;0,600;0,700;1,200;1,300;1,400;1,500;1,600;1,700&family=Outfit:wght@100..900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="bottle.css">
</head>
<body>
    <div class="sea-container">
        <!-- Sun rays effect -->
        <div class="sun-rays"></div>
        
        <!-- Sea Background Layers -->
        <div class="ocean">
            <div class="wave"></div>
            <div class="wave"></div>
            <div class="wave"></div>
        </div>

        <!-- Bubbles -->
        <div class="bubbles" id="bubble-container"></div>

        <!-- Floating Bottles Container -->
        <div class="bottles-container" id="bottles-wrapper">
            <!-- Bottles will be injected here via JS -->
        </div>


        <!-- Page Header -->
        <div class="header">
            <h1>Messages from <span>Ohna</span></h1>
            <p>ลอยส่งใจให้ NexT1DE 🌊</p>
        </div>
    </div>

    <script src="bottle.js"></script>
</body>
</html>
