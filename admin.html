<!DOCTYPE html>
<html lang="th">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard - NexT1DE</title>
    <link
        href="https://fonts.googleapis.com/css2?family=Noto+Sans+Thai:wght@300;400;500;600;700;800&family=Outfit:wght@700;800&display=swap"
        rel="stylesheet">
    <link rel="icon" type="image/png" href="images/logo-project.png">
    <link rel="stylesheet" href="admin.css">
</head>

<body>

    <div class="admin-container-lite">

        <!-- Ultra-Compact Header & Filters -->
        <header class="compact-header">
            <div class="header-main">
                <a href="dashboard.html" class="btn-back-icon" title="กลับหน้าหลัก">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"></polyline></svg>
                </a>
                <div class="header-title-wrapper">
                    <span class="header-subtitle">Admin Panel</span>
                    <h1 class="header-title-compact">Giveaway & Workshop</h1>
                </div>
            </div>
            <div class="header-controls">
                <button id="btn-export-excel" class="btn-export-mini" title="ส่งออกไฟล์ Excel" disabled>
                    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path><polyline points="7 10 12 15 17 10"></polyline><line x1="12" y1="15" x2="12" y2="3"></line></svg>
                    <span>ส่งออก Excel</span>
                </button>
                <div class="search-box-mini">
                    <input type="text" id="search-input" placeholder="ค้นหาชื่อ/UID...">
                </div>
                <div class="filters-mini-group">
                    <select id="filter-shipping">
                        <option value="all">วิธีรับทั้งหมด</option>
                        <option value="delivery">จัดส่ง</option>
                        <option value="onsite">หน้างาน</option>
                    </select>
                    <select id="filter-set">
                        <option value="all">เซตทั้งหมด</option>
                        <option value="4">เซต 4</option>
                        <option value="3">เซต 3</option>
                        <option value="2">เซต 2</option>
                        <option value="1">เซต 1</option>
                        <option value="0">ไม่ได้รับ</option>
                    </select>
                </div>
            </div>
        </header>

        <!-- Visual Stats Dashboard (Ultra Compact) -->
        <section id="stats-dashboard" class="visual-stats-dashboard" style="display: none;">

            <!-- Overall Stats Row -->
            <div id="finance-stats" class="finance-row-compact">
                <!-- Injected by JS: Raw, Net, Users, Workshop -->
            </div>

            <div class="visual-stats-grid">
                <!-- Sets Distribution (Stacked Bar) -->
                <div class="visual-card">
                    <div class="visual-card-title">สัดส่วนผู้ได้รับ Giveaway Sets</div>
                    <div id="sets-stacked-bar" class="stacked-bar-wrapper">
                        <!-- Injected by JS -->
                    </div>
                    <div id="sets-legend" class="sets-legend">
                        <!-- Injected by JS -->
                    </div>
                </div>

                <!-- Items Breakdown (Mini Bars) -->
                <div class="visual-card">
                    <div class="visual-card-title">Giveaway</div>
                    <div id="item-stats" class="items-mini-bars">
                        <!-- Injected by JS -->
                    </div>
                </div>
            </div>

        </section>

        <div id="tab-info-bar" class="tab-info-bar-mini">
            พบรายชื่อ 0 คน
        </div>

        <!-- Scrollable Data Area -->
        <main class="data-view-area">
            <div class="table-wrapper">
                <table id="admin-table">
                    <thead>
                        <tr>
                            <th style="width: 15%;">ผู้ใช้</th>
                            <th style="width: 15%;">Giveaway ที่ได้รับ</th>
                            <th style="width: 15%;">Workshop</th>
                            <th style="width: 12%;">ยอด (สุทธิ)</th>
                            <th style="width: 12%;">วิธีรับของ</th>
                            <th>ที่อยู่ & ติดต่อ</th>
                        </tr>
                    </thead>
                    <tbody id="user-rows">
                        <!-- Data injected by JS -->
                    </tbody>
                </table>
            </div>
        </main>

    </div>

    <!-- Notification Toast -->
    <div id="toast" class="toast"></div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <script src="config.js"></script>
    <script src="admin.js"></script>

</body>

</html>
