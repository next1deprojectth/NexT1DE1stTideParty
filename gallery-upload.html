<!DOCTYPE html>
<html lang="th">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gallery Upload Closed - NexT1DE 1st Tide Party</title>
    <link
        href="https://fonts.googleapis.com/css2?family=Noto+Sans+Thai:wght@300;400;500;600;700;800&family=Sriracha&display=swap"
        rel="stylesheet">
    <link rel="icon" type="image/png" href="images/logo-project.png">
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="gallery-upload.css">
    <style>
        :root {
            --primary-blue: #286ACD;
            --accent-teal: #00b698;
            --soft-pink: #F871B4;
            --navy-deep: #0A1628;
        }

        body {
            background-color: #f0f2f5;
            overflow-x: hidden;
        }

        .closed-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: url('images/final_gallery.png');
            background-size: cover;
            background-position: center;
            opacity: 0.45; /* Increased from 0.15 */
            filter: blur(2px); /* Reduced from 5px */
            z-index: -1;
        }

        .main-container {
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 40px 20px;
        }

        .premium-card {
            background: rgba(255, 255, 255, 0.6);
            backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px);
            border-radius: 28px;
            padding: 30px 20px; /* Even more compact */
            width: 100%;
            max-width: 380px; /* Reduced from 440px */
            text-align: center;
            box-shadow: 0 15px 45px rgba(10, 22, 40, 0.08);
            border: 1px solid rgba(255, 255, 255, 0.5);
            position: relative;
            overflow: hidden;
        }

        .premium-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 6px;
            background: linear-gradient(90deg, var(--primary-blue), var(--accent-teal), var(--soft-pink));
        }

        .brand-logos {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin-bottom: 25px;
        }

        .brand-logos img {
            height: 35px;
            filter: drop-shadow(0 4px 10px rgba(0,0,0,0.05));
        }

        .status-title {
            font-size: 1.5rem;
            font-weight: 800;
            color: var(--navy-deep);
            margin-bottom: 8px;
            letter-spacing: -0.5px;
            line-height: 1.2;
        }

        .thanks-msg {
            font-family: 'Sriracha', cursive;
            font-size: 0.95rem;
            color: #4A5568;
            margin-bottom: 25px;
            opacity: 0.9;
        }

        .info-section {
            background: rgba(255, 255, 255, 0.4);
            border-radius: 20px;
            padding: 20px 15px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.02);
            border: 1px solid rgba(255, 255, 255, 0.6);
            position: relative;
            backdrop-filter: blur(5px);
        }

        .event-badge {
            display: inline-block;
            background: var(--primary-blue);
            color: white;
            padding: 4px 14px;
            border-radius: 50px;
            font-weight: 700;
            font-size: 0.75rem;
            margin-bottom: 15px;
            text-transform: uppercase;
            letter-spacing: 1px;
            box-shadow: 0 4px 12px rgba(40, 106, 205, 0.2);
        }

        .display-msg {
            font-size: 1rem;
            color: #2D3748;
            font-weight: 500;
            margin-bottom: 10px;
            line-height: 1.5;
        }

        .event-name {
            font-size: 1.6rem;
            font-weight: 900;
            background: linear-gradient(135deg, var(--primary-blue), #1A365D);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 20px;
            display: block;
        }

        .details-grid {
            display: flex;
            flex-direction: column;
            gap: 10px;
            margin-top: 15px;
        }

        .detail-card {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px 15px;
            background: rgba(247, 250, 252, 0.6);
            border-radius: 14px;
            transition: transform 0.2s;
        }

        .detail-card:hover {
            transform: translateY(-2px);
            background: #EDF2F7;
        }

        .icon-wrap {
            width: 42px;
            height: 42px;
            background: white;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.2rem;
            box-shadow: 0 4px 10px rgba(0,0,0,0.05);
        }

        .detail-info {
            text-align: left;
        }

        .detail-label {
            display: block;
            font-size: 0.75rem;
            color: #718096;
            font-weight: 600;
            text-transform: uppercase;
            margin-bottom: 2px;
        }

        .detail-value {
            font-size: 1.05rem;
            color: var(--navy-deep);
            font-weight: 700;
        }

        .actions {
            margin-top: 50px;
        }

        .btn-home {
            display: inline-block;
            background: var(--navy-deep);
            color: white;
            text-decoration: none;
            padding: 18px 50px;
            border-radius: 20px;
            font-weight: 700;
            font-size: 1.1rem;
            transition: all 0.3s;
            box-shadow: 0 10px 30px rgba(10, 22, 40, 0.2);
        }

        .btn-home:hover {
            transform: translateY(-3px);
            box-shadow: 0 15px 40px rgba(10, 22, 40, 0.3);
            background: #1A202C;
        }

        @media (max-width: 480px) {
            .status-title { font-size: 2rem; }
            .event-name { font-size: 1.8rem; }
            .premium-card { padding: 40px 20px; }
        }
    </style>
</head>

<body>
    <div class="closed-bg"></div>

    <main class="main-container">
        <section class="premium-card">
            <div class="brand-logos">
                <img src="images/nt1-logo 2.png" alt="NexT1DE Logo">
                <img src="images/logo-project.png" alt="Project Logo">
            </div>

            <h1 class="status-title">ปิดรับภาพเพื่อจัดแสดง</h1>
            <p class="thanks-msg">ขอบคุณสำหรับทุกความทรงจำที่มอบให้เรา :)</p>

            <div class="info-section">
                <span class="event-badge">Exhibition Details</span>
                <p class="display-msg">ทุกภาพ ทุกความทรงจำ จะถูกนำไปร่วมจัดแสดงภายในงาน</p>
                <strong class="event-name">NexT1DE 1st Tide Party</strong>

                <div class="details-grid">
                    <div class="detail-card">
                        <div class="icon-wrap">📍</div>
                        <div class="detail-info">
                            <span class="detail-label">Location</span>
                            <span class="detail-value">Chamchuri Square, G Floor</span>
                        </div>
                    </div>
                    <div class="detail-card">
                        <div class="icon-wrap">📅</div>
                        <div class="detail-info">
                            <span class="detail-label">Date</span>
                            <span class="detail-value">25 - 26 เมษายน 2569</span>
                        </div>
                    </div>
                </div>
            </div>

            <div class="actions">
                <a href="index.html" class="btn-home">กลับสู่หน้าหลัก</a>
            </div>
        </section>
    </main>

    <script src="config.js"></script>
</body>

</html>
