<!DOCTYPE html>
<html lang="th">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Upload Gallery - NexT1DE 1st Tide Party</title>
    <link
        href="https://fonts.googleapis.com/css2?family=Noto+Sans+Thai:wght@300;400;500;600;700&family=Sriracha&display=swap"
        rel="stylesheet">
    <link rel="icon" type="image/png" href="images/logo-project.png">
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="gallery-upload.css">
    <!-- Cropper.js -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.5.13/cropper.min.css">
</head>

<body>
    <!-- Background Image -->
    <div class="page-background"></div>

    <!-- Navbar -->
    <nav class="navbar glass">
        <div class="nav-container">
            <div class="logo">
                <a href="index.html" class="home-link" title="กลับหน้าหลัก">
                    <img src="images/nt1-logo 2.png" alt="Logo">
                    <img src="images/logo-project.png" alt="Logo">
                </a>
            </div>
        </div>
    </nav>

    <main class="main-container">
        <section class="upload-section">
            <div id="upload-form-container" class="upload-card glass">
                <div class="upload-grid">
                    <!-- Form Section -->
                    <div class="form-section">
                        <h1 class="gallery-gradient-text">NexT1DE ในสายตาคุณ</h1>
                        <p class="section-desc">เลือกรูป NexT1DE ที่คุณถ่ายและประทับใจที่สุด ใน 1 ปีที่ผ่านมา (3
                            รูป/คน)</p>

                        <!-- Upload Quota Badge -->
                        <div id="quota-badge" class="quota-badge">
                            <span id="quota-text">คุณเหลือสิทธิ์ส่งรูปอีก <strong id="quota-remaining">3</strong>
                                ครั้ง</span>
                        </div>

                        <div class="input-group">
                            <label for="owner-name">ชื่อเจ้าของภาพ (สูงสุด 30 ตัวอักษรและไม่จำเป็นต้องระบุ)</label>
                            <input type="text" id="owner-name" placeholder="ระบุชื่อของคุณ (ไม่จำเป็น)" maxlength="30">
                            <span class="char-count" id="name-count">0/30</span>
                        </div>

                        <div class="input-group">
                            <label for="image-desc">คำบรรยายภาพ (สูงสุด 50 ตัวอักษร)</label>
                            <textarea id="image-desc" placeholder="บอกเล่าเรื่องราวในภาพ" maxlength="50"
                                rows="2"></textarea>
                            <span class="char-count" id="desc-count">0/50</span>
                        </div>

                        <!-- Submit Button relocated to form bottom -->
                        <button id="btn-submit" class="btn-submit-full" disabled>ส่งภาพ</button>

                    </div>

                    <!-- Preview Section -->
                    <div class="preview-section">
                        <div class="polaroid-wrapper">
                            <!-- Interactive Preview Wrapper -->
                            <div class="polaroid-interactive-preview" id="polaroid-container"
                                onclick="document.getElementById('file-input').click()">
                                <img id="generated-polaroid-view" src="" alt="Polaroid Preview">
                                <input type="file" id="file-input" accept="image/*" style="display: none;">
                            </div>

                        </div>
                    </div>
                </div>
            </div>

            <!-- Success Summary Section (Initially Hidden) -->
            <div id="success-container" class="upload-card glass" style="display: none; text-align: center;">
                <h2 class="gradient-text">ส่งข้อมูลสำเร็จแล้ว!</h2>
                <p class="section-desc" style="margin-bottom: 10px;">ขอบคุณที่ส่งภาพเข้ามาร่วมกันสร้างความทรงจำในงานนี้
                </p>

                <!-- Remaining quota after success -->
                <div id="success-quota-badge" class="quota-badge quota-badge-success">
                    <span id="success-quota-text">คุณเหลือสิทธิ์ส่งรูปอีก <strong
                            id="success-quota-remaining">2</strong> ครั้ง</span>
                </div>

                <div class="success-img-wrapper" style="margin-bottom: 30px;">
                    <img id="final-polaroid-img" src="" alt="Final Polaroid"
                        style="max-width: 100%; border-radius: 10px; box-shadow: 0 10px 30px rgba(0,0,0,0.15);">
                </div>

                <div class="success-actions">
                    <a href="index.html" class="btn-blue"
                        style="text-decoration: none; padding: 12px 30px; border-radius: 12px;">กลับหน้าหลัก</a>
                    <button id="btn-upload-again" onclick="location.reload()" class="btn-secondary"
                        style="margin-left: 10px; padding: 12px 30px; border-radius: 12px;">ส่งภาพใหม่</button>
                </div>
            </div>
        </section>
    </main>

    <!-- Cropping Modal -->
    <div id="crop-modal" class="modal">
        <div class="modal-content glass">
            <h3>ปรับแต่งรูปภาพ (4:6)</h3>
            <div class="cropper-container">
                <img id="cropper-img" src="" alt="To crop">
            </div>
            <div class="modal-actions">
                <button id="btn-cancel-crop" class="btn-secondary">ยกเลิก</button>
                <button id="btn-confirm-crop" class="btn-blue">ตกลง</button>
            </div>
        </div>
    </div>

    <!-- Zoom Preview Modal -->
    <div id="zoom-modal" class="modal">
        <div class="zoom-modal-content" id="zoom-modal-content">
            <button class="zoom-close-btn" id="btn-zoom-close">&times;</button>
            <img id="zoom-modal-img" src="" alt="Zoomed Preview">
        </div>
    </div>

    <!-- Loading Overlay -->
    <div id="loading-overlay" class="modal" style="display: none;">
        <div class="loading-spinner"></div>
        <p style="color: white; margin-top: 15px;">กำลังบันทึกภาพ...</p>
    </div>

    <script src="config.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.5.13/cropper.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <script src="gallery-upload.js"></script>
</body>

</html>
